<div
  class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8"
>
  <div class="max-w-md w-full space-y-8">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Sign in to your account
      </h2>
    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="mt-8 space-y-6"
    >
      <div *ngIf="error" class="rounded-md bg-red-50 p-4">
        <p class="text-sm font-medium text-red-800">{{ error }}</p>
      </div>

      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="email" class="sr-only">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            formControlName="email"
            class="appearance-none rounded-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-xl focus:outline-none focus:ring-gray-900 focus:border-gray-900 focus:z-10 sm:text-sm transition-all"
            placeholder="Email address or Twitter handle"
          />
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input
            id="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            required
            formControlName="password"
            class="appearance-none rounded-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-xl focus:outline-none focus:ring-gray-900 focus:border-gray-900 focus:z-10 sm:text-sm transition-all"
            placeholder="Password"
          />
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="show-password"
            name="show-password"
            type="checkbox"
            (change)="togglePasswordVisibility()"
            class="h-4 w-4 text-gray-900 focus:ring-gray-900 border-gray-300 rounded"
          />
          <label for="show-password" class="ml-2 block text-sm text-gray-900">
            Show password
          </label>
        </div>
        <div class="text-sm">
          <a href="javascript:void(0)" (click)="forgotPassword()" class="font-medium text-gray-900 hover:text-gray-600">
            Forgot your password?
          </a>
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="!loginForm.valid || loading"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 disabled:opacity-50 transition-all shadow-lg hover:shadow-xl active:scale-[0.98]"
        >
          {{ loading ? "Signing in..." : "Sign in" }}
        </button>
      </div>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-gray-50 text-gray-500">Or continue with</span>
        </div>
      </div>

      <button
        type="button"
        (click)="loginWithTwitter()"
        [disabled]="loading"
        class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-gray-200 text-sm font-bold rounded-xl text-gray-700 bg-white hover:bg-gray-50 focus:outline-none transition-all shadow-sm hover:shadow-md disabled:opacity-50"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.045 4.126H5.078z"/>
        </svg>
        Sign in with Twitter
      </button>


      <div class="text-center">
        <p class="text-sm text-gray-600">
          Don't have an account?
          <a
            routerLink="/signup"
            class="font-medium text-gray-900 hover:text-gray-600"
          >
            Sign up
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
